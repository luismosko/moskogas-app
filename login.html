<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — MoskoApp v1.3.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo img { height: 48px; }
  .logo h1 { font-size: 22px; color: #1e293b; margin-top: 8px; }
  .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
  label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
  input { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 16px; transition: border-color 0.2s; }
  input:focus { outline: none; border-color: #f97316; }
  .btn-login { width: 100%; padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-login:hover { background: #ea580c; }
  .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
  .error-msg { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 16px; display: none; }
  .version-badge { font-size: 10px; color: #94a3b8; text-align: center; margin-top: 16px; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <img src="https://moskogas.com.br/wp-content/uploads/2021/08/Logo-Moskogas-Ultragaz.png" alt="Mosko Gás" onerror="this.style.display='none'">
    <h1>MoskoApp</h1>
    <p>Sistema de Gestão de Pedidos</p>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <form id="login-form" onsubmit="doLogin(event)">
    <label>Usuário</label>
    <input type="text" id="login" autocomplete="username" autocapitalize="off" required autofocus>

    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password" required>

    <button type="submit" class="btn-login" id="btn-submit">🔐 Entrar</button>
  </form>

  <div style="text-align:center;margin-top:12px">
    <a href="#" onclick="abrirRecuperacao();return false;" style="font-size:13px;color:#f97316;text-decoration:none;font-weight:600">🔑 Esqueci minha senha</a>
  </div>

  <div class="version-badge">v1.3.0 — login</div>

  <!-- Modal Recuperação de Senha -->
<div id="modal-recuperar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px;color:#1e293b">🔑 Recuperar Senha</h2>
      <button onclick="fecharRecuperacao()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1">&times;</button>
    </div>

    <!-- Etapa 1: Login -->
    <div id="rec-step1">
      <p style="font-size:14px;color:#64748b;margin-bottom:16px">Digite seu login para receber o código de verificação por WhatsApp e/ou e-mail.</p>
      <label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase">Login</label>
      <input type="text" id="rec-login" autocapitalize="off" autocomplete="off" placeholder="seu.login"
        style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px">
      <div id="rec-err1" style="background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px;display:none"></div>
      <button onclick="enviarCodigo()" id="rec-btn1" style="width:100%;padding:13px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">📨 Enviar Código</button>
    </div>

    <!-- Etapa 2: Código + Nova Senha -->
    <div id="rec-step2" style="display:none">
      <div id="rec-canais" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#166534"></div>
      <label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase">Código recebido</label>
      <input type="text" id="rec-codigo" maxlength="6" placeholder="000000" autocomplete="off"
        style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:8px;font-size:28px;font-weight:800;letter-spacing:10px;text-align:center;margin-bottom:16px;font-family:monospace"
        oninput="this.value=this.value.replace(/\D/g,'')">
      <label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase">Nova Senha</label>
      <input type="password" id="rec-nova" placeholder="Mínimo 6 caracteres"
        style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:12px">
      <label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase">Confirmar Nova Senha</label>
      <input type="password" id="rec-confirma" placeholder="Repita a senha"
        style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px">
      <div id="rec-err2" style="background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px;display:none"></div>
      <button onclick="confirmarCodigo()" id="rec-btn2" style="width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">✅ Redefinir Senha</button>
      <button onclick="voltarEtapa1()" style="width:100%;padding:10px;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;margin-top:8px">← Voltar</button>
    </div>

    <!-- Etapa 3: Sucesso -->
    <div id="rec-step3" style="display:none;text-align:center;padding:16px 0">
      <div style="font-size:56px;margin-bottom:12px">🎉</div>
      <h3 style="color:#16a34a;margin:0 0 8px">Senha redefinida!</h3>
      <p style="color:#64748b;font-size:14px;margin-bottom:20px">Sua senha foi atualizada com sucesso. Faça login com a nova senha.</p>
      <button onclick="fecharRecuperacao()" style="padding:12px 32px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">🔐 Ir para Login</button>
    </div>
  </div>
</div>

<script>
let _recLogin = '';

function abrirRecuperacao() {
  document.getElementById('modal-recuperar').style.display = 'flex';
  document.getElementById('rec-login').focus();
}
function fecharRecuperacao() {
  document.getElementById('modal-recuperar').style.display = 'none';
  voltarEtapa1();
}
function voltarEtapa1() {
  document.getElementById('rec-step1').style.display = 'block';
  document.getElementById('rec-step2').style.display = 'none';
  document.getElementById('rec-step3').style.display = 'none';
  document.getElementById('rec-err1').style.display = 'none';
  document.getElementById('rec-codigo').value = '';
  document.getElementById('rec-nova').value = '';
  document.getElementById('rec-confirma').value = '';
}

async function enviarCodigo() {
  const login = document.getElementById('rec-login').value.trim().toLowerCase();
  const err1 = document.getElementById('rec-err1');
  const btn = document.getElementById('rec-btn1');
  err1.style.display = 'none';
  if (!login) { err1.textContent = 'Digite seu login'; err1.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '⏳ Enviando...';
  try {
    const r = await fetch(API_BASE + '/api/auth/recuperar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login })
    });
    const data = await r.json();
    if (!data.ok) { err1.textContent = data.error || 'Erro ao enviar código'; err1.style.display = 'block'; return; }
    _recLogin = login;
    // Monta mensagem de canais
    const canais = [];
    if (data.sent?.whatsapp) canais.push('📱 WhatsApp');
    if (data.sent?.email) canais.push('📧 E-mail');
    const canaisEl = document.getElementById('rec-canais');
    if (canais.length) {
      canaisEl.innerHTML = `✅ Código enviado via ${canais.join(' e ')}`;
    } else {
      canaisEl.style.background = '#fefce8'; canaisEl.style.borderColor = '#fef08a'; canaisEl.style.color = '#854d0e';
      canaisEl.innerHTML = '⚠️ Código gerado. Se não receber, fale com o administrador.';
    }
    document.getElementById('rec-step1').style.display = 'none';
    document.getElementById('rec-step2').style.display = 'block';
    setTimeout(() => document.getElementById('rec-codigo').focus(), 100);
  } catch(e) {
    err1.textContent = 'Erro de conexão: ' + e.message; err1.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '📨 Enviar Código';
  }
}

async function confirmarCodigo() {
  const codigo = document.getElementById('rec-codigo').value.trim();
  const nova = document.getElementById('rec-nova').value;
  const confirma = document.getElementById('rec-confirma').value;
  const err2 = document.getElementById('rec-err2');
  const btn = document.getElementById('rec-btn2');
  err2.style.display = 'none';
  if (!codigo || codigo.length !== 6) { err2.textContent = 'Digite o código de 6 dígitos'; err2.style.display = 'block'; return; }
  if (!nova || nova.length < 6) { err2.textContent = 'Senha mínima: 6 caracteres'; err2.style.display = 'block'; return; }
  if (nova !== confirma) { err2.textContent = 'As senhas não coincidem'; err2.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '⏳ Verificando...';
  try {
    const r = await fetch(API_BASE + '/api/auth/recuperar/verificar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login: _recLogin, token: codigo, nova_senha: nova })
    });
    const data = await r.json();
    if (!data.ok) { err2.textContent = data.error || 'Código inválido ou expirado'; err2.style.display = 'block'; return; }
    document.getElementById('rec-step2').style.display = 'none';
    document.getElementById('rec-step3').style.display = 'block';
  } catch(e) {
    err2.textContent = 'Erro de conexão: ' + e.message; err2.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '✅ Redefinir Senha';
  }
}

// Enter nos campos
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('rec-step1').style.display !== 'none' && document.activeElement === document.getElementById('rec-login')) enviarCodigo();
  if (document.getElementById('rec-step2').style.display !== 'none' && (document.activeElement === document.getElementById('rec-confirma') || document.activeElement === document.getElementById('rec-nova'))) confirmarCodigo();
});
</script>


  <div id="bling-section" style="margin-top:16px;padding:14px;background:#f8fafc;border-radius:10px;border:2px solid #e2e8f0;display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span id="bling-dot" style="width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block"></span>
        <span id="bling-label" style="font-size:13px;font-weight:600;color:#64748b">Verificando Bling...</span>
      </div>
      <button id="bling-btn" onclick="connectBling()" style="display:none;padding:6px 14px;background:#f97316;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">🔗 Conectar</button>
    </div>
    <div id="bling-detail" style="font-size:11px;color:#94a3b8;margin-top:4px"></div>
  </div>
</div>

<script>
const API_BASE = 'https://api.moskogas.com.br';

// Se já tem sessão válida, redireciona
(async () => {
  const token = localStorage.getItem('mg_session_token');
  if (!token) return;
  try {
    const resp = await fetch(API_BASE + '/api/auth/session', { headers: { 'Authorization': 'Bearer ' + token } });
    if (resp.ok) {
      const data = await resp.json();
      redirectByRole(data.user.role);
    } else {
      localStorage.removeItem('mg_session_token');
      localStorage.removeItem('mg_user');
    }
  } catch(e) {}
})();

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '⏳ Entrando...';

  try {
    const login = document.getElementById('login').value.trim().toLowerCase();
    const senha = document.getElementById('senha').value;

    const resp = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, senha }),
    });
    const data = await resp.json();

    if (!resp.ok || !data.ok) {
      if (resp.status === 429) {
        errEl.textContent = '⏳ Muitas tentativas. Aguarde 15 minutos e tente novamente.';
        errEl.style.display = 'block';
        btn.disabled = true;
        btn.textContent = '🔒 Bloqueado';
        setTimeout(() => { btn.disabled = false; btn.textContent = '🔐 Entrar'; }, 60000);
      } else {
        errEl.textContent = data.error || 'Usuário ou senha inválidos';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔐 Entrar';
      }
      return;
    }

    // Salva sessão
    localStorage.setItem('mg_session_token', data.token);
    localStorage.setItem('mg_user', JSON.stringify(data.user));
    // Mantém API key para compatibilidade (se existir)
    // localStorage.setItem('mg_api_key', '...'); // removido — agora usa sessão

    redirectByRole(data.user.role);
  } catch(e) {
    errEl.textContent = 'Erro de conexão: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🔐 Entrar';
  }
}

function redirectByRole(role) {
  switch (role) {
    case 'entregador':
      window.location.href = 'entregador.html';
      break;
    case 'atendente':
      window.location.href = 'pedido.html';
      break;
    case 'admin':
    default:
      window.location.href = 'pedido.html';
      break;
  }
}

// ── Bling Status ──────────────────────────────────────────────
async function checkBlingStatus() {
  const section = document.getElementById('bling-section');
  const dot = document.getElementById('bling-dot');
  const label = document.getElementById('bling-label');
  const detail = document.getElementById('bling-detail');
  const btn = document.getElementById('bling-btn');
  section.style.display = 'block';

  try {
    const resp = await fetch(API_BASE + '/api/pub/bling-status');
    const data = await resp.json();

    if (data.ok) {
      dot.style.background = '#22c55e';
      label.style.color = '#16a34a';
      label.textContent = '✅ Bling conectado';
      detail.textContent = `Token válido — ${data.token_minutes_left} min restantes`;
      btn.style.display = 'none';
      section.style.borderColor = '#bbf7d0';
      section.style.background = '#f0fdf4';
    } else {
      dot.style.background = '#dc2626';
      label.style.color = '#dc2626';
      label.textContent = '❌ Bling desconectado';
      detail.textContent = data.error || 'Token expirado ou não configurado';
      btn.style.display = 'inline-block';
      section.style.borderColor = '#fecaca';
      section.style.background = '#fef2f2';
    }
  } catch(e) {
    dot.style.background = '#f59e0b';
    label.style.color = '#d97706';
    label.textContent = '⚠️ Sem conexão com API';
    detail.textContent = e.message;
    btn.style.display = 'none';
    section.style.borderColor = '#fde68a';
    section.style.background = '#fffbeb';
  }
}

function connectBling() {
  const w = 600, h = 700;
  const left = (screen.width - w) / 2;
  const top = (screen.height - h) / 2;
  window.open(
    API_BASE + '/bling/oauth/start',
    'bling_oauth',
    `width=${w},height=${h},left=${left},top=${top},scrollbars=yes`
  );
}

// Escuta callback do popup Bling
window.addEventListener('message', (e) => {
  if (e.data?.type === 'bling_connected') {
    checkBlingStatus();
  }
});

// Check Bling ao carregar
checkBlingStatus();
</script>
</body>
</html>
