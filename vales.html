<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Vale Gás v1.2.1 — MoskoGás</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f1f5f9; }
        .toolbar { background:#fff; padding:12px 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; border-bottom:2px solid #e2e8f0; position:sticky; top:0; z-index:50; box-shadow:0 2px 8px rgba(0,0,0,.08); }
        .btn { padding:8px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px; }
        .btn-orange { background:#f97316; color:#fff; }
        .btn-blue   { background:#2563eb; color:#fff; }
        .btn-green  { background:#16a34a; color:#fff; }
        .btn-gray   { background:#94a3b8; color:#fff; }
        .btn-red    { background:#dc2626; color:#fff; }
        .btn:hover  { opacity:.85; }
        table { width:100%; border-collapse:collapse; background:#fff; }
        th { background:#475569; color:#fff; padding:8px 10px; text-align:left; font-size:12px; font-weight:700; white-space:nowrap; position:sticky; top:58px; z-index:40; }
        td { padding:8px 10px; border-bottom:1px solid #f1f5f9; font-size:13px; vertical-align:middle; }
        tr:hover td { background:#f0f4ff; }
        tbody tr { cursor:pointer; transition:background .1s; }
        .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:700; color:#fff; }
        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#fff; border-radius:14px; padding:24px; width:min(560px,95vw); max-height:90vh; overflow-y:auto; }
        .modal label { display:block; font-size:11px; font-weight:700; color:#64748b; margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
        .modal select, .modal input[type=text], .modal input[type=number] { width:100%; padding:10px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px; margin-bottom:12px; }
        .modal select:focus, .modal input:focus { outline:none; border-color:#f97316; }
        .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
        /* Autocomplete */
        .search-wrap { position:relative; margin-bottom:12px; }
        .search-wrap input { margin-bottom:0; }
        #suggestions { position:absolute; top:100%; left:0; right:0; background:#fff; border:2px solid #f97316; border-top:none; border-radius:0 0 8px 8px; z-index:300; max-height:220px; overflow-y:auto; display:none; box-shadow:0 4px 12px rgba(0,0,0,.12); }
        .sug-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid #f1f5f9; font-size:14px; }
        .sug-item:hover { background:#fff7ed; }
        .sug-item strong { color:#1e293b; display:block; }
        .sug-item small { color:#64748b; font-size:11px; }
        /* Itens */
        .itens-wrap { background:#f8fafc; border:2px solid #e2e8f0; border-radius:10px; padding:12px; margin-bottom:12px; }
        .itens-wrap h3 { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; margin-bottom:10px; }
        .add-item-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; }
        .add-item-row > div { flex:1; }
        .add-item-row label { margin-bottom:3px; }
        .add-item-row select, .add-item-row input { margin-bottom:0; }
        .add-item-row .btn { flex-shrink:0; height:42px; }
        .item-list { display:flex; flex-direction:column; gap:6px; }
        .item-row { display:flex; align-items:center; justify-content:space-between; background:#fff; padding:8px 12px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px; }
        .item-qtd { background:#f97316; color:#fff; border-radius:20px; padding:2px 10px; font-size:12px; font-weight:700; }
        .item-name { font-weight:700; color:#1e293b; margin-left:10px; }
        .rm-btn { background:none; border:none; color:#dc2626; cursor:pointer; font-size:20px; line-height:1; padding:0 4px; }
        .rm-btn:hover { color:#991b1b; }
        .empty-items { color:#94a3b8; font-size:13px; text-align:center; padding:12px 0; }
        .total-bar { background:#1e293b; color:#fff; padding:10px 14px; border-radius:8px; font-size:15px; font-weight:700; margin-bottom:12px; display:flex; justify-content:space-between; }
        .total-bar span { color:#f97316; }
        /* View modal */
        .summary-bar { background:#1e293b; color:#fff; padding:12px 16px; font-size:14px; display:flex; gap:20px; flex-wrap:wrap; border-radius:8px; margin-bottom:16px; }
        .summary-bar strong { color:#f97316; }
        .vales-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:6px; }
        .vale-card { padding:8px; border-radius:8px; border:2px solid #e2e8f0; text-align:center; }
        .vale-card.pendente  { background:#f0fdf4; border-color:#bbf7d0; color:#166534; }
        .vale-card.resgatado { background:#fef2f2; border-color:#fecaca; color:#991b1b; }
        .v-num { font-size:14px; font-weight:800; }
        .v-sub { font-size:10px; color:#475569; margin-top:2px; }
        .baixa-btn { margin-top:4px; cursor:pointer; background:#fff; border:1px solid #16a34a; color:#16a34a; border-radius:4px; font-size:10px; width:100%; padding:3px 0; }
    </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="toolbar">
    <button class="btn btn-blue" onclick="openNewModal()"><span style="font-size:16px">+</span> Nova Emissão de Vale Gás</button>
    <span style="font-size:11px;color:#94a3b8;font-weight:bold;">v1.2.1</span>
    <button class="btn btn-orange" onclick="load()" title="Recarregar">🔄 Atualizar</button>
    <span style="font-size:12px;color:#64748b;margin-left:4px" id="count-badge"></span>

    <!-- Filtros -->
    <div style="display:flex;gap:4px;margin-left:8px;background:#f1f5f9;border-radius:8px;padding:3px;">
        <button id="filt-todos"    onclick="setFiltro('todos')"      style="padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#2563eb;color:#fff;">Todos</button>
        <button id="filt-ativos"   onclick="setFiltro('ativos')"     style="padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;">🟢 Ativos</button>
        <button id="filt-completos" onclick="setFiltro('completos')" style="padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;">✅ Resgatados</button>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px;">
        <input type="number" id="baixaValeId" placeholder="ID do Vale para Baixar" style="width:180px; padding:8px 12px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px;" onkeydown="if(event.key==='Enter') darBaixa(this.value)">
        <button class="btn btn-red" onclick="darBaixa(document.getElementById('baixaValeId').value)">🎯 Dar Baixa Rápida</button>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>#</th><th>Data/Hora</th><th>Cliente</th><th>Produtos</th>
            <th>Pgto</th><th>Resgates</th><th>NF / Empenho</th><th>Ações</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<!-- MODAL NOVA NOTA -->
<div class="modal-overlay" id="modal-nova">
    <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 style="font-size:18px;color:#1e293b">🎫 Emitir Nova Nota de Vale Gás</h2>
            <button onclick="closeNovaModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8" title="Fechar">&times;</button>
        </div>

        <label>🔍 Cliente / Empresa / Razão Social *</label>
        <div class="search-wrap">
            <input type="text" id="searchName" placeholder="Digite o nome para buscar..." autocomplete="off" oninput="buscaCliente()">
            <input type="hidden" id="n-cliente">
            <input type="hidden" id="n-cliente-phone">
            <input type="hidden" id="n-cliente-bling-id">
            <input type="hidden" id="n-cliente-tipo">
            <div id="suggestions"></div>
        </div>

        <!-- v1.2.0: Seção de emissão fiscal -->
        <div style="background:#f0f9ff;border:2px solid #7dd3fc;border-radius:10px;padding:14px;margin-bottom:14px">
            <label style="margin:0 0 10px 0;font-size:13px;color:#0369a1;font-weight:800">📄 EMISSÃO DE NOTA FISCAL</label>
            <div style="display:flex;flex-direction:column;gap:8px" id="nf-options">
                <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;margin:0" onclick="selNfOpcao('externa')">
                    <input type="radio" name="nf-opcao" value="externa" checked style="margin-top:3px;width:18px;height:18px;accent-color:#2563eb">
                    <div>
                        <strong style="color:#1e293b">📁 NF já foi emitida (externa)</strong>
                        <div style="font-size:12px;color:#64748b;margin-top:2px">Empenho, lote anterior, ou NF de outro sistema</div>
                    </div>
                </label>
                <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;margin:0" onclick="selNfOpcao('nfce')">
                    <input type="radio" name="nf-opcao" value="nfce" style="margin-top:3px;width:18px;height:18px;accent-color:#16a34a">
                    <div>
                        <strong style="color:#16a34a">🧾 Emitir NFC-e agora (Pessoa Física)</strong>
                        <div style="font-size:12px;color:#64748b;margin-top:2px">Consumidor Final — gera NFC-e automaticamente</div>
                    </div>
                </label>
                <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;margin:0" onclick="selNfOpcao('venda_bling')">
                    <input type="radio" name="nf-opcao" value="venda_bling" style="margin-top:3px;width:18px;height:18px;accent-color:#f97316">
                    <div>
                        <strong style="color:#f97316">🏢 Gerar Venda Bling (Pessoa Jurídica)</strong>
                        <div style="font-size:12px;color:#64748b;margin-top:2px">Empresa cadastrada no Bling — NF-e manual depois</div>
                    </div>
                </label>
            </div>
            <div id="nf-alerta-pj" style="display:none;margin-top:10px;padding:10px;background:#fef3c7;border:2px solid #f59e0b;border-radius:8px;font-size:12px;color:#92400e">
                ⚠️ <strong>Atenção:</strong> Para emitir NF-e, o cliente deve estar cadastrado e sincronizado no Bling.
            </div>
        </div>

        <div id="nf-externa-fields">
            <div style="display:flex;gap:12px">
                <div style="flex:1"><label>Nº Nota Fiscal (Opc.)</label><input type="text" id="n-nf" placeholder="Ex: 54321"></div>
                <div style="flex:1"><label>Nº Empenho (Opc.)</label><input type="text" id="n-empenho" placeholder="Ex: 2025NE00012"></div>
            </div>
        </div>
        <div style="display:flex;gap:12px">
            <div style="flex:1"><label>Validade (Opc.)</label><input type="text" id="n-validade" placeholder="Ex: 31/12/2025 ou Dez/2025"></div>
        </div>

        <div class="itens-wrap">
            <h3>📦 Produtos / Itens</h3>
            <div class="add-item-row">
                <div>
                    <label>Produto</label>
                    <select id="add-produto">
                        <option value="P13" data-bling="572628371" data-preco="125">🔴 P13 — Botijão 13kg (R$ 125)</option>
                        <option value="P45" data-bling="591856471" data-preco="495">🟡 P45 — Botijão 45kg (R$ 495)</option>
                        <option value="Água 20L" data-bling="629495768" data-preco="25">💧 Água Mineral 20L (R$ 25)</option>
                    </select>
                </div>
                <div style="flex:0 0 90px"><label>Quantidade</label><input type="number" id="add-qtd" value="10" min="1" max="500"></div>
                <button class="btn btn-orange" onclick="addItem()" style="padding:0 14px">+ Adicionar</button>
            </div>
            <div class="item-list" id="item-list">
                <div class="empty-items">Nenhum produto adicionado ainda.</div>
            </div>
        </div>

        <label>Forma de Pagamento *</label>
        <select id="n-pgto">
            <option value="dinheiro">💵 Dinheiro</option>
            <option value="pix_vista">⚡ PIX à vista</option>
            <option value="pix_receber">⏳ PIX a receber</option>
            <option value="debito">💳 Cartão de Débito</option>
            <option value="credito">💳 Cartão de Crédito</option>
            <option value="mensalista">📅 Mensalista (Boleto/Fiado)</option>
        </select>

        <div class="total-bar">
            <span style="color:#fff">Total de Vales:</span>
            <span><span id="n-total-vales">0 vales</span><span id="n-total-valor" style="display:none;color:#4ade80;margin-left:8px"></span></span>
        </div>

        <div class="modal-footer">
            <button class="btn btn-gray" onclick="closeNovaModal()">Cancelar</button>
            <button class="btn btn-green" onclick="salvarNota()" id="n-btn-save">✅ Confirmar Emissão</button>
        </div>
    </div>
</div>

<!-- MODAL DETALHES -->
<div class="modal-overlay" id="modal-view">
    <div class="modal" style="width:min(700px,95vw);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h2 style="margin:0;font-size:18px;color:#1e293b" id="det-title">Nota #</h2>
            <button onclick="closeViewModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8" title="Fechar">&times;</button>
        </div>
        <div class="summary-bar">
            <span id="det-cli"></span>
            <span id="det-qty"></span>
            <span id="det-resgatados"></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <h3 style="font-size:14px;color:#475569;flex:1">🎫 Vales Emitidos</h3>
            <input type="text" id="busca-vale" placeholder="🔍 Buscar Nº ou ID do ticket..." autocomplete="off"
                oninput="filtrarVales(this.value)"
                style="padding:7px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;width:220px;outline:none;"
                onfocus="this.style.borderColor='#f97316'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <div class="vales-grid" id="det-vales-list"></div>
        <div class="modal-footer" style="margin-top:20px;">
            <button class="btn btn-gray" onclick="closeViewModal()">Fechar</button>
            <span id="det-btn-apagar"></span>
            <button class="btn btn-blue" onclick="imprimirAtual()">🖨️ Imprimir A4</button>
        </div>
    </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = NAV_HTML;
window.addEventListener('DOMContentLoaded', () => {
    if (typeof requireAdminOrAtendente === 'function') requireAdminOrAtendente();
    // v1.1.6: Verifica se veio do empenho
    setTimeout(() => checkFromEmpenho(), 300);
});

// v1.1.6: Integração com Empenhos — pré-preenche dados do empenho
function checkFromEmpenho() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('from_empenho') !== '1') return;

    const dadosStr = sessionStorage.getItem('empenho_para_vale');
    if (!dadosStr) return;

    try {
        const dados = JSON.parse(dadosStr);
        sessionStorage.removeItem('empenho_para_vale'); // Limpa após usar

        // Abre o modal de nova nota
        openNovaModal();

        // Preenche campos
        setTimeout(() => {
            document.getElementById('searchName').value = dados.cliente_nome || '';
            document.getElementById('n-cliente').value = dados.cliente_nome || '';
            document.getElementById('n-empenho').value = dados.empenho_numero || '';
            document.getElementById('n-validade').value = dados.validade || '';

            // Adiciona itens
            itens = [];
            (dados.itens || []).forEach(it => {
                itens.push({ produto: it.produto, qtd: it.quantidade });
            });
            renderItens();

            toast(`🎫 Dados do empenho ${dados.empenho_numero} carregados!`);
        }, 100);
    } catch(e) {
        console.error('Erro ao carregar dados do empenho:', e);
    }
}

let notasData = [], currentViewId = null, searchTimer = null, itens = [], filtroAtual = 'todos';

function setFiltro(f) {
    filtroAtual = f;
    ['todos','ativos','completos'].forEach(id => {
        const btn = document.getElementById('filt-' + id);
        btn.style.background = id === f ? '#2563eb' : 'transparent';
        btn.style.color      = id === f ? '#fff'    : '#64748b';
    });
    renderTable();
}

async function load() {
    showLoading('Carregando notas...');
    try {
        const res = await api('/api/vales/notas');
        notasData = res.notas || [];
        renderTable();
        document.getElementById('count-badge').textContent = notasData.length + ' notas recentes';
    } catch (e) { toast('Erro ao carregar: ' + e.message, 'error'); }
    finally { hideLoading(); }
}

function renderTable() {
    const tbody = document.getElementById('tbody');
    let dados = notasData;
    if (filtroAtual === 'ativos')    dados = notasData.filter(n => n.resgatados < n.total_vales);
    if (filtroAtual === 'completos') dados = notasData.filter(n => n.resgatados >= n.total_vales && n.total_vales > 0);
    if (!dados.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#94a3b8">' +
            (filtroAtual === 'ativos' ? 'Nenhuma nota com vales em aberto.' :
             filtroAtual === 'completos' ? 'Nenhuma nota totalmente resgatada.' :
             'Nenhuma emissão encontrada.') + '</td></tr>';
        return;
    }
    const PL = { dinheiro:'💵 Dinheiro', pix_vista:'⚡ PIX Vista', pix_receber:'⏳ PIX Rec.', debito:'💳 Débito', credito:'💳 Crédito', mensalista:'📅 Mensalista' };
    tbody.innerHTML = dados.map(n => {
        const d = new Date(n.created_at * 1000).toLocaleString('pt-BR', { timeZone: 'America/Campo_Grande' });
        const pco = n.resgatados === n.total_vales && n.total_vales > 0 ? '#16a34a' : (n.resgatados > 0 ? '#f59e0b' : '#64748b');
        const badge = '<span class="badge" style="background:' + pco + '">' + n.resgatados + ' / ' + n.total_vales + ' resgatados</span>';
        let itensHtml = '';
        try {
            const its = JSON.parse(n.itens_json || '[]');
            itensHtml = its.map(it => '<span style="font-size:11px;background:#f1f5f9;padding:1px 6px;border-radius:8px;margin-right:3px">' + it.produto + ': ' + it.quantidade + '</span>').join('');
        } catch(_) { itensHtml = '<span style="font-size:12px;color:#64748b">' + n.quantidade + ' vales</span>'; }
        const docs = [];
        // v1.2.0: Mostrar origem da NF
        if (n.nf_origem === 'nfce' && n.nfce_numero) {
            docs.push('<span style="background:#16a34a;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px">🧾 NFC-e ' + n.nfce_numero + '</span>');
        } else if (n.nf_origem === 'venda_bling' && n.bling_pedido_num) {
            docs.push('<span style="background:#f97316;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px">🏢 Bling #' + n.bling_pedido_num + '</span>');
        } else if (n.nota_fiscal) {
            docs.push('<strong>NF:</strong> ' + n.nota_fiscal);
        }
        if (n.empenho) docs.push('<strong>Emp:</strong> ' + n.empenho);
        // Mostrar valor total se houver
        const valorInfo = n.total > 0 ? '<div style="font-size:10px;color:#16a34a;font-weight:700">R$ ' + parseFloat(n.total).toFixed(2) + '</div>' : '';
        return '<tr onclick="viewNota(' + n.id + ')">' +
            '<td><strong style="color:#2563eb">#' + n.id + '</strong>' + valorInfo + '</td>' +
            '<td style="font-size:12px">' + d + '</td>' +
            '<td><strong>' + n.cliente_nome + '</strong></td>' +
            '<td>' + itensHtml + '</td>' +
            '<td>' + (PL[n.forma_pagamento] || n.forma_pagamento) + '</td>' +
            '<td>' + badge + '</td>' +
            '<td style="font-size:11px;color:#475569">' + (docs.join('<br>') || '—') + '</td>' +
            '<td><button class="btn btn-blue" onclick="event.stopPropagation(); window.open(\'print-vales.html?id=' + n.id + '\', \'_blank\')" style="padding:4px 8px;font-size:11px">🖨️ Imprimir</button>' +
            '' +
            '</td>' +
            '</tr>';
    }).join('');
}

function openNewModal() {
    itens = [];
    ['n-cliente','n-nf','n-empenho','n-validade','n-cliente-phone','n-cliente-bling-id','n-cliente-tipo'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    document.getElementById('searchName').value = '';
    document.getElementById('add-qtd').value = '10';
    document.getElementById('add-produto').value = 'P13';
    document.getElementById('n-pgto').value = 'dinheiro';
    document.getElementById('suggestions').style.display = 'none';
    // v1.2.0: Reset opção NF para externa
    const radioExterna = document.querySelector('input[name="nf-opcao"][value="externa"]');
    if (radioExterna) radioExterna.checked = true;
    selNfOpcao('externa');
    renderItens();
    document.getElementById('modal-nova').classList.add('open');
    setTimeout(() => document.getElementById('searchName').focus(), 100);
}

// v1.2.0: Controle de opções de NF
function selNfOpcao(opcao) {
    const externaFields = document.getElementById('nf-externa-fields');
    const alertaPj = document.getElementById('nf-alerta-pj');
    
    // Mostrar/esconder campos de NF externa
    if (externaFields) {
        externaFields.style.display = opcao === 'externa' ? 'block' : 'none';
    }
    
    // Mostrar alerta PJ se venda_bling
    if (alertaPj) {
        alertaPj.style.display = opcao === 'venda_bling' ? 'block' : 'none';
    }
    
    // Atualizar total com valor se não for externa
    renderItens();
}

function checkPjAlerta() {
    const nfOpcao = document.querySelector('input[name="nf-opcao"]:checked')?.value || 'externa';
    const alertaPj = document.getElementById('nf-alerta-pj');
    const blingId = document.getElementById('n-cliente-bling-id')?.value || '';
    
    if (alertaPj && nfOpcao === 'venda_bling') {
        if (blingId) {
            alertaPj.style.display = 'none';
        } else {
            alertaPj.style.display = 'block';
        }
    }
}

function closeNovaModal() { document.getElementById('modal-nova').classList.remove('open'); }

function buscaCliente() {
    const name = document.getElementById('searchName').value.trim();
    document.getElementById('n-cliente').value = name;
    clearTimeout(searchTimer);
    if (name.length < 2) { document.getElementById('suggestions').style.display = 'none'; return; }
    searchTimer = setTimeout(async () => {
        try {
            const res = await api('/api/customer/search-multi?' + new URLSearchParams({ name }));
            const box = document.getElementById('suggestions');
            if (!res.length) { box.style.display = 'none'; return; }
            box.innerHTML = res.map((c, i) => {
                const bling = c.bling_contact_id ? '<span style="background:#16a34a;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:6px">B</span>' : '';
                return '<div class="sug-item" onclick="selecionaCliente(' + i + ')"><strong>' + (c.name || c.customer_name) + bling + '</strong><small>' + (c.address_line || '') + (c.bairro ? ' — ' + c.bairro : '') + '</small></div>';
            }).join('');
            box._data = res;
            box.style.display = 'block';
        } catch(e) { console.error(e); }
    }, 280);
}

function selecionaCliente(i) {
    const c = document.getElementById('suggestions')._data[i];
    const nome = c.name || c.customer_name || '';
    document.getElementById('n-cliente').value = nome;
    document.getElementById('searchName').value = nome;
    // v1.2.0: Salvar dados extras para NFC-e/Venda Bling
    document.getElementById('n-cliente-phone').value = c.phone_digits || '';
    document.getElementById('n-cliente-bling-id').value = c.bling_contact_id || '';
    document.getElementById('n-cliente-tipo').value = c.tipo_pessoa || 'F';
    document.getElementById('suggestions').style.display = 'none';
    // Mostrar alerta se PJ selecionado e opção venda_bling
    checkPjAlerta();
}

document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) {
        const s = document.getElementById('suggestions');
        if (s) s.style.display = 'none';
    }
});

function addItem() {
    const sel = document.getElementById('add-produto');
    const produto = sel.value;
    const opt = sel.options[sel.selectedIndex];
    const preco = parseFloat(opt.dataset.preco) || 0;
    const blingId = opt.dataset.bling || '';
    const qtd = parseInt(document.getElementById('add-qtd').value) || 0;
    if (qtd < 1) return toast('Quantidade deve ser maior que zero', 'error');
    const existing = itens.find(it => it.produto === produto);
    if (existing) { existing.quantidade += qtd; } 
    else { itens.push({ produto, quantidade: qtd, preco, bling_id: blingId }); }
    renderItens();
    document.getElementById('add-qtd').value = '10';
}

function removeItem(idx) { itens.splice(idx, 1); renderItens(); }

function renderItens() {
    const list = document.getElementById('item-list');
    const totalQtd = itens.reduce((s, it) => s + it.quantidade, 0);
    const totalVal = itens.reduce((s, it) => s + (it.quantidade * (it.preco || 0)), 0);
    document.getElementById('n-total-vales').textContent = totalQtd + ' vales';
    // Mostrar total em R$ se for NFC-e ou Venda Bling
    const nfOpcao = document.querySelector('input[name="nf-opcao"]:checked')?.value || 'externa';
    const showTotal = nfOpcao !== 'externa' && totalVal > 0;
    const totalEl = document.getElementById('n-total-valor');
    if (totalEl) {
        totalEl.textContent = showTotal ? ' — R$ ' + totalVal.toFixed(2) : '';
        totalEl.style.display = showTotal ? 'inline' : 'none';
    }
    if (!itens.length) { list.innerHTML = '<div class="empty-items">Nenhum produto adicionado ainda.</div>'; return; }
    const icons = { P13:'🔴', P45:'🟡', 'Água 20L':'💧' };
    list.innerHTML = itens.map((it, i) => {
        const subtotal = (it.quantidade * (it.preco || 0)).toFixed(2);
        return '<div class="item-row"><div style="display:flex;align-items:center"><span class="item-qtd">' + it.quantidade + 'x</span>' +
            '<span class="item-name">' + (icons[it.produto] || '📦') + ' ' + it.produto + '</span>' +
            (it.preco ? '<span style="color:#64748b;font-size:12px;margin-left:8px">(R$ ' + subtotal + ')</span>' : '') +
            '</div><button class="rm-btn" onclick="removeItem(' + i + ')" title="Remover">&times;</button></div>';
    }).join('');
}

async function salvarNota() {
    const cli = document.getElementById('n-cliente').value.trim() || document.getElementById('searchName').value.trim();
    if (!cli) return toast('Insira o nome do cliente', 'error');
    if (!itens.length) return toast('Adicione pelo menos um produto', 'error');
    
    const nfOpcao = document.querySelector('input[name="nf-opcao"]:checked')?.value || 'externa';
    const clienteBlingId = document.getElementById('n-cliente-bling-id')?.value || '';
    const clientePhone = document.getElementById('n-cliente-phone')?.value || '';
    
    // Validação para Venda Bling (PJ)
    if (nfOpcao === 'venda_bling' && !clienteBlingId) {
        return toast('⚠️ Para gerar Venda Bling, o cliente deve estar cadastrado e sincronizado no Bling!', 'error');
    }
    
    const btn = document.getElementById('n-btn-save');
    btn.disabled = true; 
    btn.textContent = nfOpcao === 'externa' ? 'Aguarde...' : '⏳ Emitindo NF...';
    showLoading(nfOpcao === 'nfce' ? 'Gerando NFC-e...' : nfOpcao === 'venda_bling' ? 'Criando Venda Bling...' : 'Salvando...');
    
    try {
        const payload = {
            cliente_nome: cli, 
            itens,
            forma_pagamento: document.getElementById('n-pgto').value,
            nota_fiscal: document.getElementById('n-nf').value.trim(),
            empenho: document.getElementById('n-empenho').value.trim(),
            validade: document.getElementById('n-validade').value.trim(),
            // v1.2.0: Novos campos
            nf_origem: nfOpcao,
            cliente_telefone: clientePhone,
            bling_contact_id: clienteBlingId
        };
        
        const res = await api('/api/vales/notas', { method: 'POST', body: JSON.stringify(payload) });
        
        let msg = '✅ Nota #' + res.nota_id + ' emitida com sucesso!';
        if (res.nfce_numero) msg += ' NFC-e: ' + res.nfce_numero;
        if (res.bling_pedido_num) msg += ' Pedido Bling: ' + res.bling_pedido_num;
        
        toast(msg);
        closeNovaModal(); load();
        setTimeout(() => window.open('print-vales.html?id=' + res.nota_id, '_blank'), 500);
    } catch(e) { toast(e.message, 'error'); }
    finally { 
        hideLoading();
        btn.disabled = false; btn.textContent = '✅ Confirmar Emissão'; 
    }
}

async function viewNota(id) {
    currentViewId = id;
    showLoading('Buscando detalhes...');
    try {
        const res = await api('/api/vales/notas/' + id);
        document.getElementById('det-title').textContent = 'Nota de Vale Gás #' + res.nota.id;
        document.getElementById('det-cli').innerHTML = '🏢 <strong>' + res.nota.cliente_nome + '</strong>';
        document.getElementById('det-qty').innerHTML = '🎫 Emitidos: <strong>' + res.nota.quantidade + '</strong>';
        let regs = 0;
        const grid = res.vales.map(v => {
            if (v.status === 'resgatado') regs++;
            const cl = v.status === 'resgatado' ? 'resgatado' : 'pendente';
            const sub = v.status === 'resgatado'
                ? '<div class="v-sub">Resgatado ' + new Date(v.resgatado_em * 1000).toLocaleDateString('pt-BR', { timeZone: 'America/Campo_Grande' }) + '</div>'
                : '<button class="baixa-btn" onclick="darBaixa(' + v.id + ')">✅ Dar Baixa</button>';
            return '<div class="vale-card ' + cl + '"><div class="v-num">' + (v.status==='resgatado'?'❌':'🎫') + ' ' + v.numero + '</div><div class="v-sub">ID: ' + v.id + '</div>' + sub + '</div>';
        }).join('');
        document.getElementById('det-resgatados').innerHTML = '🔄 Resgatados: <strong>' + regs + ' / ' + res.vales.length + '</strong>';
        document.getElementById('det-vales-list').innerHTML = grid;
        // Botão apagar só para admin
        document.getElementById('det-btn-apagar').innerHTML = isAdmin()
            ? ''
            : '';
        document.getElementById('modal-view').classList.add('open');
    } catch(e) { toast(e.message, 'error'); }
    finally { hideLoading(); }
}

function closeViewModal() { document.getElementById('modal-view').classList.remove('open'); currentViewId = null; }
function imprimirAtual() { if (currentViewId) window.open('print-vales.html?id=' + currentViewId, '_blank'); }

function filtrarVales(q) {
    const termo = q.trim().toLowerCase();
    const cards = document.querySelectorAll('#det-vales-list .vale-card');
    cards.forEach(card => {
        const txt = card.textContent.toLowerCase();
        if (!termo || txt.includes(termo)) {
            card.style.display = '';
            card.style.outline = termo ? '2px solid #f97316' : '';
        } else {
            card.style.display = 'none';
            card.style.outline = '';
        }
    });
}

function isAdmin() {
    try { const u = JSON.parse(localStorage.getItem('mg_user') || '{}'); return u.role === 'admin'; } catch(_) { return false; }
}

async function apagarNota(id) {
    if (!confirm('⚠️ Apagar a Nota #' + id + ' e TODOS os seus vales?\n\nEsta ação não pode ser desfeita!')) return;
    showLoading('Apagando...');
    try {
        await api('/api/vales/notas/' + id, { method: 'DELETE' });
        toast('🗑️ Nota #' + id + ' apagada!');
        closeViewModal();
        load();
    } catch(e) { toast(e.message, 'error'); }
    finally { hideLoading(); }
}

async function darBaixa(valeId) {
    if (!valeId) return;
    if (!confirm('Confirma a BAIXA do Vale ID ' + valeId + '?\n\nEsta ação não poderá ser desfeita.')) return;
    showLoading('Baixando vale...');
    try {
        await api('/api/vales/' + valeId + '/baixa', { method: 'PATCH' });
        toast('✅ Vale baixado com sucesso!');
        await load();
        if (currentViewId) await viewNota(currentViewId);
        document.getElementById('baixaValeId').value = '';
    } catch(e) { toast(e.message, 'error'); }
    finally { hideLoading(); }
}

load();
</script>
